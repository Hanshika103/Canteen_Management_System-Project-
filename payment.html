<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff8f0; padding: 20px; }
        h2 { text-align: center; color: #ff6600; margin-bottom: 20px; }
        form { max-width: 400px; margin: auto; text-align: center; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; font-size: 16px; }
        button { background-color: #ff6600; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #e65c00; }
    </style>
</head>
<body>
    <h2>Payment</h2>
    <form id="paymentForm">
        <label for="method">Select Payment Method:</label>
        <select id="method" required>
            <option value="Cash">Cash</option>
            <option value="Card">Card</option>
        </select>
        <button type="submit">Pay Now</button>
    </form>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(e){
            e.preventDefault();

            const method = document.getElementById('method').value;
            const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
            const student_id = sessionStorage.getItem('student_id');

            if (!student_id) {
                alert('Please login first!');
                window.location.href = 'login.html';
                return;
            }

            fetch('http://localhost:9090/Canteen_Managemnt/PaymentServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id, cart, method })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Payment Successful!');
                    sessionStorage.removeItem('cart');
                    window.location.href = 'orders.html';
                } else {
                    alert('Payment Failed!');
                }
            })
            .catch(err => console.error(err));
        });
    </script>
</body>
</html>
