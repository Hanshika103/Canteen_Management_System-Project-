<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff8f0; padding: 20px; }
        h2 { text-align: center; color: #ff6600; margin-bottom: 20px; }
        .cart-item { border: 1px solid #eee; border-radius: 10px; padding: 10px; margin: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 5px rgba(0,0,0,0.1);}
        .cart-item button { background-color: #ff6600; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .cart-item button:hover { background-color: #e65c00; }
        #total { font-size: 20px; text-align: right; margin-top: 20px; color: #ff6600; }
        #checkout { display: block; margin: 20px auto; padding: 10px 20px; background-color: #ff6600; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #checkout:hover { background-color: #e65c00; }
    </style>
</head>
<body>
    <h2>Your Cart</h2>
    <div id="cart-list"></div>
    <h3 id="total">Total: ₹0</h3>
    <button id="checkout">Proceed to Payment</button>

    <script>
        // Load cart from sessionStorage
        let cart = JSON.parse(sessionStorage.getItem('cart')) || [];

        function renderCart() {
            const cartContainer = document.getElementById('cart-list');
            cartContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <span>${item.item_name} × ${item.quantity} - ₹${item.price * item.quantity}</span>
                    <button onclick="removeFromCart(${index})">Remove</button>
                `;
                cartContainer.appendChild(div);
            });
            document.getElementById('total').innerText = 'Total: ₹' + total;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            sessionStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        document.getElementById('checkout').addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'payment.html';
        });

        renderCart();
    </script>
</body>
</html>
