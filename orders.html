<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff8f0; padding: 20px; }
        h2 { text-align: center; color: #ff6600; margin-bottom: 20px; }
        .order-item { border: 1px solid #eee; border-radius: 10px; padding: 10px; margin: 10px; box-shadow: 0 0 5px rgba(0,0,0,0.1);}
    </style>
</head>
<body>
    <h2>Your Orders</h2>
    <div id="order-list"></div>

    <script>
        const student_id = sessionStorage.getItem('student_id');
        if (!student_id) {
            window.location.href = 'login.html';
        }

        fetch(`http://localhost:9090/Canteen_Management/OrderServlet?student_id=${student_id}`)
        .then(res => res.json())
        .then(orders => {
            const container = document.getElementById('order-list');
            container.innerHTML = '';

            orders.forEach(order => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerHTML = `
                    <p>Order ID: ${order.order_id}</p>
                    <p>Items: ${order.items.map(i => i.item_name + ' × ' + i.quantity).join(', ')}</p>
                    <p>Total: ₹${order.total_amount}</p>
                    <p>Status: ${order.order_status}</p>
                    <p>Date: ${new Date(order.order_date).toLocaleString()}</p>
                `;
                container.appendChild(div);
            });
        })
        .catch(err => console.error(err));
    </script>
</body>
</html>
